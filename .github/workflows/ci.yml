name: CI

on:
  push:
    branches: [main, feature/*]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"

jobs:
  # ── Lint ────────────────────────────────────────────────────────────────
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install ruff
        run: pip install ruff

      - name: Lint
        run: ruff check .

  # ── Unit tests ──────────────────────────────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run unit tests
        run: pytest tests/unit/ -v --tb=short --cov=core --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          fail_ci_if_error: false

  # ── Integration tests ───────────────────────────────────────────────────
  integration-tests:
    name: Integration Tests (paper mode)
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run integration tests
        env:
          EXECUTION_MODE: paper
          TRADING_ENABLED: "false"
          JWT_SECRET_KEY: ci-test-secret-key-minimum-32-chars-long
          BINANCE_API_KEY: ""
          BINANCE_API_SECRET: ""
        run: pytest tests/integration/ -v --tb=short

  # ── Safety gate ─────────────────────────────────────────────────────────
  safety-checks:
    name: Safety Gate
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Verify EXECUTION_MODE defaults to paper
        run: |
          grep -q "EXECUTION_MODE=paper" .env.example || (echo "❌ EXECUTION_MODE must default to paper" && exit 1)
          echo "✅ EXECUTION_MODE defaults to paper"

      - name: Verify TRADING_ENABLED defaults to false
        run: |
          grep -q "TRADING_ENABLED=false" .env.example || (echo "❌ TRADING_ENABLED must default to false" && exit 1)
          echo "✅ TRADING_ENABLED defaults to false"

      - name: Check for hardcoded secrets
        run: |
          ! grep -rn --include="*.py" "api_secret\s*=\s*['\"][A-Za-z0-9]" core/ api/ || \
            (echo "❌ Potential hardcoded secret found" && exit 1)
          echo "✅ No hardcoded secrets found"

  # ── Backtest gate ────────────────────────────────────────────────────────
  backtest-gate:
    name: Backtest Quality Gate
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run backtest gate
        env:
          EXECUTION_MODE: paper
          TRADING_ENABLED: "false"
          JWT_SECRET_KEY: ci-test-secret-key-minimum-32-chars-long
        run: python scripts/ci_backtest_gate.py

  # ── Docker build ─────────────────────────────────────────────────────────
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [unit-tests, safety-checks]
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -f docker/Dockerfile -t trader-ai:ci .

      - name: Verify container starts
        run: |
          docker run --rm \
            -e EXECUTION_MODE=paper \
            -e TRADING_ENABLED=false \
            -e JWT_SECRET_KEY=ci-test-secret-key-minimum-32-chars-long \
            -e BINANCE_API_KEY="" \
            -e BINANCE_API_SECRET="" \
            trader-ai:ci python -c "from core.config.settings import get_settings; s = get_settings(); print('✅ Config OK, mode:', s.EXECUTION_MODE)"
