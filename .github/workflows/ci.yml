name: CI

on:
  push:
    branches: [main, feature/*]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Lint
        run: ruff check .

      - name: Run unit tests
        run: pytest tests/unit/ -v --tb=short

      - name: Verify EXECUTION_MODE is paper
        run: |
          grep -q "EXECUTION_MODE=paper" .env.example || exit 1
          echo "Safety check passed: EXECUTION_MODE defaults to paper"
