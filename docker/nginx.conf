# nginx.conf — TRADER AI reverse proxy
# Place this in C:\nginx\conf\nginx.conf on the VPS
# Requires: win-acme for Let's Encrypt (https://www.win-acme.com/)
# Docs: https://nginx.org/en/docs/

worker_processes  1;

events {
    worker_connections  1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout  65;

    # Rate limiting zone
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;

    # Redirect HTTP → HTTPS
    server {
        listen      80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # HTTPS — FastAPI
    server {
        listen       443 ssl;
        server_name  YOUR_DOMAIN_OR_IP;   # <-- replace before deploying

        # Let's Encrypt certs (managed by win-acme)
        ssl_certificate     C:/win-acme/certs/YOUR_DOMAIN/fullchain.pem;
        ssl_certificate_key C:/win-acme/certs/YOUR_DOMAIN/privkey.pem;

        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        # Security headers
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options DENY always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-XSS-Protection "1; mode=block" always;

        # FastAPI (port 8000)
        location /api/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass         http://127.0.0.1:8000/;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
        }

        # FastAPI root and docs
        location / {
            limit_req zone=api burst=20 nodelay;
            proxy_pass         http://127.0.0.1:8000;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # Streamlit dashboard (port 8501)
        location /dashboard/ {
            proxy_pass         http://127.0.0.1:8501/;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
        }

        # Grafana (port 3000) — internal monitoring only
        location /grafana/ {
            proxy_pass         http://127.0.0.1:3000/;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
        }

        # Block access to Prometheus directly
        location /prometheus/ {
            deny all;
        }
    }
}
